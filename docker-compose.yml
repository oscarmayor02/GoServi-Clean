version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: goservi-db
    environment:
      POSTGRES_DB: goservi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - goservi_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  goservi_data:
