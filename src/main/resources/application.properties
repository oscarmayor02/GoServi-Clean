# =============================
# SERVER
# =============================
server.port=${PORT:8080}

# =============================
# DATABASE
# =============================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/goserviv3}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.globally_quoted_identifiers=false
spring.jpa.properties.hibernate.globally_quoted_identifiers_skip_column_definitions=true

# =============================
# JWT
# =============================
jwt.secret=${JWT_SECRET:change-me-in-production-min-32-chars}
jwt.expiration=${JWT_EXPIRATION:86400000}

# =============================
# MAIL (Gmail SMTP)
# =============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000
app.mail.from=${MAIL_FROM:noreply@goservi.com}
app.mail.dev=${MAIL_DEV:}

# =============================
# TWILIO (SMS)
# =============================
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.phone-number=${TWILIO_PHONE_NUMBER:}

# =============================
# CLOUDINARY (Imagenes)
# =============================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# =============================
# WOMPI (Pagos Colombia)
# =============================
wompi.url=${WOMPI_URL:https://sandbox.wompi.co/v1}
wompi.public-key=${WOMPI_PUBLIC_KEY:}
wompi.private-key=${WOMPI_PRIVATE_KEY:}
wompi.events-secret=${WOMPI_EVENTS_SECRET:}
wompi.integrity-secret=${WOMPI_INTEGRITY_SECRET:}

# =============================
# GOOGLE MAPS
# =============================
google.maps.api-key=${GOOGLE_MAPS_API_KEY:}

# =============================
# FILE UPLOAD
# =============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# =============================
# SWAGGER
# =============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# =============================
# LOGGING
# =============================
logging.level.com.goservi=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=INFO